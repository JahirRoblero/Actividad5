<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login.css">
    
</head>
<body>
    <div class="contenedor">

        <form>
            <div>
                <img src="img/user-login.svg" alt="usuario-login" class="usuario-login">
                <h1>INICIO DE SESIÓN</h1>
                <label>Correo Electrónico</label>
                <input type="text" name="email" id="email" placeholder="Ejemplo@hotmail.com">
                <span class="emergent-label" id="correo-label">Correo No Válido!</span>
            </div>
            <div>
                <label>Contraseña</label>
                <input type="password" name="password" id="password" placeholder="********">
                <span class="emergent-label" id="password-label">Contraseña No Válida!</span>
            </div>

            <button type="button"class="boton-iniciar" id="boton-iniciar">
                 INICIAR SESIÓN
            </button>

            <p class="badge-exito" id="badgeExito">
                Inicio de sesión válido
            </p>

        </form>

    </div>
    <script src="js/login.js"></script>
    <script src="js/utileria.js"></script>
</body>
</html>
