<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de alumnos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <div class="contenedor-barras">
        <button class="btn-menu" type="button" onclick="toggleSidebar()">
          <img id="lineasLaterales" src="img/lineasLaterales.svg" />
        </button>

        <h1>Usuarios</h1>
      </div>

      <div class="contenedor-usuario">
        <img id="imagenUsuario" src="img/usuario.svg" />
        <p id="nombreUsuario">Jahir Roblero</p>
      </div>
    </header>

    <section>
      <div class="bienvenida" id="bienvenida">
        <h2>Bienvenido al Sistema</h2>
      </div>

      <form id="formCapturaUsuario" class="apartado oculto">
        <div class="formulario">
          <h2>Captura de usuarios</h2>

          <label for="nombreUsuarioCaptura">Nombre del usuario:</label>
          <input
            type="text"
            id="nombreUsuarioCaptura"
            placeholder="Ej. Angel Jahir"
          />

          <label for="correo">Correo electrónico:</label>
          <input
            type="text"
            id="correo"
            placeholder="Ej. Jahirgomezyt2@gmail.com"
          />

          <label for="contraseña">Contraseña:</label>
          <input type="password" id="contraseña" />

          <button type="submit">Guardar Usuario</button>
        </div>
      </form>

      <form id="formValidarAlumno" class="apartado oculto">
        <div class="formulario">
          <h2>Validar alumno</h2>

          <label for="nombreAlumno">Nombre del alumno:</label>
          <input type="text" id="nombreAlumno" placeholder="Ej. Jahir" />

          <label for="numeroControl">Número de control:</label>
          <input
            type="text"
            id="numeroControl"
            placeholder="Ej. 231609"
            maxlength="6"
          />

          <label for="fechaNacimiento">Fecha de nacimiento:</label>
          <input type="date" id="fechaNacimiento" />

          <button type="submit">Validar Alumno</button>
        </div>
      </form>
    </section>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Menú</h2>

        <button
          class="btn-cerrar-sidebar"
          type="button"
          onclick="toggleSidebar()"
        >
          ✕
        </button>
      </div>

      <nav class="sidebar-menu">
        <button
          class="opcion-sidebar"
          type="button"
          onclick="toggleSubmenuUsuarios()"
        >
          <span>Usuarios</span>
          <span id="flechaUsuarios">▼</span>
        </button>

        <div class="submenu-sidebar" id="submenuUsuarios">
          <button
            class="submenu-link"
            type="button"
            onclick="mostrarApartado('captura')"
          >
            Captura
          </button>

          <button
            class="submenu-link"
            type="button"
            onclick="mostrarApartado('alumnos')"
          >
            Validar Alumnos
          </button>
        </div>
      </nav>
    </aside>

    <footer>
      <p>ALUMNOS: GOMEZ ROBLERO ANGEL JAHIR</p>
      <p>GUILLERMO ALEJANDRO</p>
      <p>DOCENTE: MARTINEZ NIETO ADELINA</p>
    </footer>

    <script src="js/utileria.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
